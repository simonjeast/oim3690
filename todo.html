<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>To-Do App</title>
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap"
			rel="stylesheet"
		/>
		<link rel="stylesheet" href="css/todo.css" />
	</head>
	<body>
		<main class="app" aria-labelledby="app-title">
			<header class="app__header">
				<p class="app__eyebrow">Productivity</p>
				<h1 id="app-title">To-Do List</h1>
			</header>

			<form id="todo-form" class="todo-form" autocomplete="off">
				<label for="todo-input" class="sr-only">Add a new task</label>
				<input
					id="todo-input"
					name="todo"
					type="text"
					placeholder="Add a task..."
					maxlength="120"
					required
				/>
				<button type="submit">Add</button>
			</form>

			<section class="controls" aria-label="Task filters">
				<button type="button" class="filter-btn is-active" data-filter="all">All</button>
				<button type="button" class="filter-btn" data-filter="active">Active</button>
				<button type="button" class="filter-btn" data-filter="completed">Completed</button>
			</section>

			<ul id="todo-list" class="todo-list" aria-live="polite"></ul>

			<footer class="app__footer">
				<p id="todo-count">0 tasks left</p>
				<button type="button" id="clear-completed" class="clear-btn">Clear completed</button>
			</footer>
		</main>

		<script src="js/todo.js"></script>
	</body>
</html>
