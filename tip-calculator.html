<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tip Calculator</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: "Segoe UI", Tahoma, sans-serif;
        background: linear-gradient(160deg, #eef4ff, #dff7ff);
      }

      .card {
        width: min(460px, 100%);
        background: #ffffff;
        border-radius: 16px;
        padding: 24px;
        box-shadow: 0 12px 30px rgba(15, 23, 42, 0.12);
      }

      h1 {
        margin: 0 0 16px;
        font-size: 1.7rem;
      }

      .row {
        display: grid;
        gap: 8px;
        margin-bottom: 12px;
      }

      label {
        font-weight: 600;
      }

      input,
      button {
        font: inherit;
        padding: 10px 12px;
        border-radius: 10px;
      }

      input {
        border: 1px solid #cbd5e1;
      }

      button {
        width: 100%;
        border: none;
        background: #0f766e;
        color: #ffffff;
        cursor: pointer;
        font-weight: 700;
      }

      button:hover {
        filter: brightness(1.05);
      }

      #result {
        margin: 14px 0 0;
        min-height: 1.8em;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Tip Calculator</h1>

      <div class="row">
        <label for="billAmount">Bill Amount ($)</label>
        <input id="billAmount" type="number" step="0.01" placeholder="e.g. 42.50" />
      </div>

      <div class="row">
        <label for="tipPercent">Tip Percentage (%)</label>
        <input id="tipPercent" type="number" step="0.1" placeholder="e.g. 18" />
      </div>

      <button id="calculateBtn" type="button">Calculate</button>
      <p id="result" aria-live="polite"></p>
    </main>

    <script>
      const billInput = document.querySelector("#billAmount");
      const tipInput = document.querySelector("#tipPercent");
      const calculateButton = document.querySelector("#calculateBtn");
      const resultText = document.querySelector("#result");

      function calculateTipAndTotal(billAmount, tipPercent) {
        const tipAmount = billAmount * (tipPercent / 100);
        const totalAmount = billAmount + tipAmount;
        return { tipAmount, totalAmount };
      }

      calculateButton.addEventListener("click", function () {
        const billAmount = Number(billInput.value);
        const tipPercent = Number(tipInput.value);

        if (Number.isNaN(billAmount) || Number.isNaN(tipPercent) || billAmount < 0 || tipPercent < 0) {
          resultText.textContent = "Please enter valid non-negative numbers.";
          return;
        }

        const { tipAmount, totalAmount } = calculateTipAndTotal(billAmount, tipPercent);

        resultText.textContent = `Tip: $${tipAmount.toFixed(2)} | Total: $${totalAmount.toFixed(2)}`;
      });
    </script>
  </body>
</html>
